name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

    # 🔷 Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget -y
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

    # 🔷 Scan Backend Image
    - name: Scan Backend Image (Trivy)
      run: |
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          ${{ secrets.DOCKER_USERNAME }}/backend:latest

    # 🔷 Scan Frontend Image
    - name: Scan Frontend Image (Trivy)
      run: |
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          ${{ secrets.DOCKER_USERNAME }}/frontend:latest

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest1
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest1
